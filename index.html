<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Для Ани ❤️</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background: linear-gradient(135deg, #ff9ecf, #ffd6ea);
      overflow:hidden;
    }

    .card{
      background:white;
      padding:40px;
      border-radius:25px;
      text-align:center;
      width:90%;
      max-width:500px;
      box-shadow:0 10px 40px rgba(0,0,0,0.15);
      animation:fade 0.6s ease;
    }

    h1{
      font-size:32px;
      margin-bottom:20px;
      color:#ff4f9a;
    }

    p{
      font-size:20px;
      color:#444;
      margin-bottom:30px;
      line-height:1.5;
    }

    .buttons{
      display:flex;
      justify-content:center;
      gap:15px;
      flex-wrap:wrap;
    }

    button{
      padding:14px 28px;
      border:none;
      border-radius:15px;
      cursor:pointer;
      font-size:18px;
      transition:0.25s;
      color:white;
    }

    .pink{
      background:#ff4f9a;
    }

    .pink:hover{
      transform:scale(1.08);
      background:#ff2e85;
    }

    .gray{
      background:#888;
    }

    .gray:hover{
      transform:scale(1.08);
      background:#666;
    }

    @keyframes fade{
      from{
        opacity:0;
        transform:translateY(20px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .heart{
      position:absolute;
      color:white;
      font-size:20px;
      animation:float 6s linear infinite;
      opacity:0.7;
    }

    @keyframes float{
      from{
        transform:translateY(100vh);
      }
      to{
        transform:translateY(-10vh);
      }
    }
  </style>
</head>
<body>

<div class="card" id="card">
  <h1>Аня ❤️</h1>
  <p>Я хочу тебе кое-что сказать...</p>

  <div class="buttons">
    <button class="pink" onclick="nextStep()">Что? 👀</button>
  </div>
</div>

<script>
  function nextStep(){
    document.getElementById("card").innerHTML = `
      <h1>✨</h1>
      <p>
        Я приглашаю тебя погулять.<br>
        Только ты и я ❤️
      </p>

      <div class="buttons">
        <button class="pink" onclick="yesAnswer()">Да 💕</button>
        <button class="gray" onclick="noAnswer()">Нет 🙄</button>
      </div>
    `;
  }

  function yesAnswer(){
    document.getElementById("card").innerHTML = `
      <h1>Урааа ❤️</h1>
      <p>
        Тогда жду тебя 25.06.26 ✨<br><br>
        Это будет лучший день :)
      </p>
    `;
  }

  function noAnswer(){
    const messages = [
      "Не принимается 😭",
      "Подумай еще раз 🥲",
      "Кнопка сломана 🙄",
      "Ну пожалуйста 😔",
      "Я все равно надеюсь ❤️"
    ];

    const random = messages[Math.floor(Math.random() * messages.length)];

    document.getElementById("card").innerHTML = `
      <h1>😢</h1>
      <p>${random}</p>

      <div class="buttons">
        <button class="pink" onclick="nextStep()">Вернуться</button>
      </div>
    `;
  }

  for(let i = 0; i < 20; i++){
    let heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
    heart.style.fontSize = (Math.random() * 20 + 15) + "px";
    document.body.appendChild(heart);
  }
</script>

</body>
</html>
